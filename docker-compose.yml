services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: lps-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lps-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: lps-kafka
    ports:
      - '9092:9092'
      - '9094:9094'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: '1'
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: '1'
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: '1'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: '0'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qg'
    healthcheck:
      test: ['CMD-SHELL', '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1']
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - lps-network

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: lps-kafka-ui
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: loan-processing
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - lps-network

  # ─── Monitoring ───────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: lps-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - lps-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: lps-grafana
    ports:
      - '3007:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - lps-network

  # ─── Microservices ────────────────────────────────────────────────────────────

  loan-service:
    build:
      context: ./services/loan-service
      dockerfile: Dockerfile
    container_name: lps-loan-service
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=loans_db
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - KAFKA_BROKER=kafka:9092
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-change-in-production-min-32-chars}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - LOG_LEVEL=info
      - KAFKAJS_NO_PARTITIONER_WARNING=1
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - lps-network
    restart: on-failure

  credit-service:
    build:
      context: ./services/credit-service
      dockerfile: Dockerfile
    container_name: lps-credit-service
    ports:
      - '3002:3002'
    environment:
      - PORT=3002
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=credit_db
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - KAFKA_BROKER=kafka:9092
      - LOG_LEVEL=info
      - KAFKAJS_NO_PARTITIONER_WARNING=1
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3002/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - lps-network
    restart: on-failure

  risk-service:
    build:
      context: ./services/risk-service
      dockerfile: Dockerfile
    container_name: lps-risk-service
    ports:
      - '3003:3003'
    environment:
      - PORT=3003
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=risk_db
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - KAFKA_BROKER=kafka:9092
      - LOG_LEVEL=info
      - KAFKAJS_NO_PARTITIONER_WARNING=1
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3003/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - lps-network
    restart: on-failure

  approval-service:
    build:
      context: ./services/approval-service
      dockerfile: Dockerfile
    container_name: lps-approval-service
    ports:
      - '3004:3004'
    environment:
      - PORT=3004
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=approval_db
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - KAFKA_BROKER=kafka:9092
      - LOG_LEVEL=info
      - KAFKAJS_NO_PARTITIONER_WARNING=1
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3004/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - lps-network
    restart: on-failure

  account-service:
    build:
      context: ./services/account-service
      dockerfile: Dockerfile
    container_name: lps-account-service
    ports:
      - '3005:3005'
    environment:
      - PORT=3005
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=accounts_db
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - KAFKA_BROKER=kafka:9092
      - LOG_LEVEL=info
      - KAFKAJS_NO_PARTITIONER_WARNING=1
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3005/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - lps-network
    restart: on-failure

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: lps-notification-service
    ports:
      - '3006:3006'
    environment:
      - PORT=3006
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=notifications_db
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - KAFKA_BROKER=kafka:9092
      - LOG_LEVEL=info
      - KAFKAJS_NO_PARTITIONER_WARNING=1
      # Leave blank to use Ethereal auto-account (preview URLs logged to console)
      # Set these for real SMTP (SendGrid, Mailgun, Gmail, etc.)
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USER=${EMAIL_USER:-}
      - EMAIL_PASS=${EMAIL_PASS:-}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3006/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - lps-network
    restart: on-failure

  # ─── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lps-frontend
    ports:
      - '3000:80'
    depends_on:
      loan-service:
        condition: service_healthy
    networks:
      - lps-network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  lps-network:
    name: loan-processing-network
    driver: bridge
