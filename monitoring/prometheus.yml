global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'loan-service'
    static_configs:
      - targets: ['loan-service:3001']
    metrics_path: /metrics

  - job_name: 'credit-service'
    static_configs:
      - targets: ['credit-service:3002']
    metrics_path: /metrics

  - job_name: 'risk-service'
    static_configs:
      - targets: ['risk-service:3003']
    metrics_path: /metrics

  - job_name: 'approval-service'
    static_configs:
      - targets: ['approval-service:3004']
    metrics_path: /metrics

  - job_name: 'account-service'
    static_configs:
      - targets: ['account-service:3005']
    metrics_path: /metrics

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:3006']
    metrics_path: /metrics
